<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hola Mundo Apple UI</title>

<!-- Fuente Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background: black;
        color: white;
    }

    /* Fondo tipo Siri */
    .background {
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 30% 30%, #ff00cc, transparent),
                    radial-gradient(circle at 70% 40%, #00ffee, transparent),
                    radial-gradient(circle at 50% 70%, #0066ff, transparent);
        filter: blur(120px);
        animation: moveBg 12s infinite alternate ease-in-out;
        z-index: 0;
    }

    @keyframes moveBg {
        0% {
            transform: translate(-10%, -10%) scale(1);
        }
        50% {
            transform: translate(10%, 5%) scale(1.2);
        }
        100% {
            transform: translate(-5%, 10%) scale(1);
        }
    }

    /* Contenedor estilo Apple */
    .card {
        position: relative;
        z-index: 1;
        backdrop-filter: blur(20px);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 24px;
        padding: 60px 80px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        text-align: center;
    }

    /* Texto animado */
    h1 {
        font-size: 48px;
        font-weight: 600;
        letter-spacing: -1px;
        animation: fadeSlide 3s ease-in-out infinite;
    }

    @keyframes fadeSlide {
        0% {
            opacity: 0;
            transform: translateY(20px);
        }
        20% {
            opacity: 1;
            transform: translateY(0);
        }
        80% {
            opacity: 1;
            transform: translateY(0);
        }
        100% {
            opacity: 0;
            transform: translateY(-20px);
        }
    }

    /* Texto secundario que cambia */
    .subtext {
        margin-top: 20px;
        font-size: 18px;
        opacity: 0.7;
        animation: changeText 9s infinite;
    }

    @keyframes changeText {
        0%   { content: "Diseño limpio"; }
        33%  { content: "Animaciones suaves"; }
        66%  { content: "Estilo Apple"; }
        100% { content: "Diseño limpio"; }
    }

</style>
</head>

<body>

<div class="background"></div>

<div class="card">
    <h1 id="mainText">Hola Mundo</h1>
    <p id="changingText">Diseño limpio</p>
</div>

<script>
    const texts = [
        "Hola Mundo",
        "Bienvenido",
        "Diseño elegante",
        "Experiencia fluida"
    ];

    let index = 0;
    const mainText = document.getElementById("mainText");

    setInterval(() => {
        index = (index + 1) % texts.length;
        mainText.textContent = texts[index];
    }, 3000);
</script>

</body>
</html>
